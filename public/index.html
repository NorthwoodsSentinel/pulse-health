<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1F2937">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>pulse-health</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --ink: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh; }
    main { padding: 24px 20px 80px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 24px; margin: 8px 0 4px; letter-spacing: -0.01em; }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
    .card { background: var(--panel); border-radius: 14px; padding: 18px;
      margin-bottom: 14px; border: 1px solid #334155; }
    .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 0 0 10px; font-weight: 600; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
    .pill.good { background: rgba(74, 222, 128, 0.15); color: var(--good); }
    .pill.warn { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
    .pill.bad { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
    .pill.idle { background: rgba(148, 163, 184, 0.15); color: var(--muted); }
    button { background: var(--accent); color: #0f172a; border: 0;
      padding: 12px 18px; border-radius: 10px; font-weight: 600;
      font-size: 15px; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
      color: var(--muted); white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow: auto; }
    .footer { text-align: center; color: var(--muted); font-size: 12px;
      margin-top: 32px; }
  </style>
</head>
<body>
  <main>
    <h1>pulse-health</h1>
    <p class="sub">Step 1 — channel proof-of-life</p>

    <div class="card">
      <h2>Push channel</h2>
      <div class="row">
        <span>Notification permission</span>
        <span id="perm-pill" class="pill idle">…</span>
      </div>
      <div class="row" style="margin-top: 8px;">
        <span>Service worker</span>
        <span id="sw-pill" class="pill idle">…</span>
      </div>
      <div class="row" style="margin-top: 8px;">
        <span>Subscription</span>
        <span id="sub-pill" class="pill idle">…</span>
      </div>
      <div style="margin-top: 16px;">
        <button id="subscribe-btn" disabled>Loading…</button>
      </div>
    </div>

    <div class="card">
      <h2>Activity log</h2>
      <div id="log" class="log">booting…</div>
    </div>

    <p class="footer">pulse-health · margin@robert-chuvala</p>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
