<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1F2937">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>pulse-health</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --ink: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --orange: #fc5200;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh; }
    main { padding: 20px 16px 80px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 4px 0 2px; letter-spacing: -0.01em; font-weight: 600; }
    .sub { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
    .card { background: var(--panel); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; border: 1px solid #334155; }
    .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 0 0 12px; font-weight: 600; display: flex;
      justify-content: space-between; align-items: center; }
    .stamp { font-weight: 400; color: var(--muted); text-transform: none;
      letter-spacing: 0; font-size: 11px; }
    .scores { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
      margin-bottom: 12px; }
    .score-box { background: var(--panel-2); border-radius: 10px; padding: 12px; }
    .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); }
    .score-value { font-size: 32px; font-weight: 700; line-height: 1.1; margin-top: 4px; }
    .score-good { color: var(--good); }
    .score-warn { color: var(--warn); }
    .score-bad { color: var(--bad); }
    .row { display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #2a3a52; font-size: 14px; }
    .row:last-child { border-bottom: 0; }
    .row .key { color: var(--muted); }
    .row .val { font-variant-numeric: tabular-nums; }
    .activity-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .activity-sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    button { background: var(--accent); color: #0f172a; border: 0;
      padding: 10px 16px; border-radius: 10px; font-weight: 600;
      font-size: 14px; cursor: pointer; width: 100%; }
    button.secondary { background: transparent; color: var(--muted);
      border: 1px solid #334155; font-weight: 500; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pill { display: inline-block; padding: 3px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    .pill.good { background: rgba(74, 222, 128, 0.15); color: var(--good); }
    .pill.warn { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
    .pill.bad { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
    .pill.idle { background: rgba(148, 163, 184, 0.15); color: var(--muted); }
    .actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .actions.two { grid-template-columns: 1fr 1fr; }
    .skeleton { color: var(--muted); font-style: italic; padding: 12px 0; }
    .ch-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .ch { background: var(--panel-2); border-radius: 6px; padding: 3px 8px;
      font-size: 11px; color: var(--muted); }
    .ch b { color: var(--ink); font-weight: 600; margin-left: 4px;
      font-variant-numeric: tabular-nums; }
    details summary { cursor: pointer; color: var(--muted); font-size: 12px;
      list-style: none; padding: 8px 0 4px; }
    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '▸ '; }
    details[open] summary::before { content: '▾ '; }
    .footer { text-align: center; color: var(--muted); font-size: 12px;
      margin-top: 24px; }
  </style>
</head>
<body>
  <main>
    <h1>pulse-health</h1>
    <p class="sub" id="last-updated">loading…</p>

    <div class="card" id="oura-card">
      <h2>Last night <span class="stamp" id="oura-stamp"></span></h2>
      <div id="oura-content"><div class="skeleton">fetching…</div></div>
    </div>

    <div class="card" id="strava-card">
      <h2>Latest activity <span class="stamp" id="strava-stamp"></span></h2>
      <div id="strava-content"><div class="skeleton">fetching…</div></div>
    </div>

    <details>
      <summary>Channel status</summary>
      <div class="card" style="margin-top:8px;">
        <div class="row"><span class="key">Notification permission</span><span class="val"><span id="perm-pill" class="pill idle">…</span></span></div>
        <div class="row"><span class="key">Service worker</span><span class="val"><span id="sw-pill" class="pill idle">…</span></span></div>
        <div class="row"><span class="key">Subscription</span><span class="val"><span id="sub-pill" class="pill idle">…</span></span></div>
        <div style="margin-top: 12px;">
          <button id="subscribe-btn" class="secondary" disabled>Loading…</button>
        </div>
      </div>
    </details>

    <p class="footer">pulse-health</p>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
