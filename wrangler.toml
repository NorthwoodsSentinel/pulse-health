name = "health"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
# `not_found_handling = "none"` (default) means non-matching paths fall through
# to the Worker. Single-page-application mode swallows /api/* before our routes
# can see them.

[[d1_databases]]
binding = "DB"
database_name = "pulse-health-db"
database_id = "e302bfea-b8a4-47e5-9218-5d020258fc20"

[observability]
enabled = true

# Daily Oura fetch at 13:00 UTC (08:00 CT, after Rob wakes — Oura nightly summary is ready).
[triggers]
crons = ["0 13 * * *"]
